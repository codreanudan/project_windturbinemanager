{% extends "base_generic.html" %}
{% load static %}

{% block content %}
<style>
    body {
        background: url("{% static 'img/login_background.jpg' %}") no-repeat center center fixed;
        background-size: cover;
        font-family: Arial, sans-serif;
    }

    .password-change-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
        padding: 1rem;
    }

    .password-change-card {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(12px);
        padding: 2.5rem 2rem;
        border-radius: 15px;
        box-shadow: 0 0 25px rgba(0, 0, 0, 0.4);
        width: 100%;
        max-width: 400px;
        color: rgb(0, 0, 0);
        text-align: center;
    }

    .password-change-card h2 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 1.5rem;
    }

    .password-change-card label {
        display: block;
        text-align: left;
        margin-bottom: 0.3rem;
        font-weight: 600;
    }

    input {
        width: 100%;
        padding: 10px 12px;
        margin-bottom: 1.2rem;
        border: 1.5px solid #ccc;
        border-radius: 8px;
        font-size: 1rem;
        color: #000;
        background-color: #fff;
        box-sizing: border-box;
    }

    .password-change-card button {
        width: 100%;
        padding: 12px;
        background-color: #28a745;
        color: white;
        font-weight: 700;
        font-size: 1.1rem;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background-color 0.3s ease;
    }

    .password-change-card button:hover {
        background-color: #218838;
    }

    .password-change-card a {
        color: #0d6efd;
        text-decoration: underline;
        font-weight: 600;
        transition: color 0.2s ease;
    }

    .password-change-card a:hover {
        color: #0a58ca;
    }

    .error-message {
        color: #ff4d4d;
        margin-bottom: 1rem;
        font-weight: 600;
        text-align: left;
    }
</style>

<div class="password-change-container">
    <div class="password-change-card">
        <h2>Schimbă parola</h2>

        {% if messages %}
        {% for message in messages %}
        <p class="error-message">{{ message }}</p>
        {% endfor %}
        {% endif %}

        <form method="post" novalidate>
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Salvează noua parolă</button>
        </form>

        <p style="margin-top: 1.2rem;">
            <a href="{% url 'dashboard' %}">Înapoi la pagina principală</a>
        </p>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<!-- Extra JS aici dacă e nevoie -->
{% endblock %}
