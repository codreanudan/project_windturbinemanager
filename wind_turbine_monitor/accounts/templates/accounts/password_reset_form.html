{% extends "base_generic.html" %}

{% block content %}
  <h2>Resetare parolă</h2>
  <p>Introdu adresa ta de email și îți vom trimite un link pentru resetare.</p>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Trimite link-ul de resetare</button>
  </form>

  <p>Dacă nu vrei să resetezi parola, poți <a href="{% url 'login' %}">să te întorci la login</a>.</p>
{% endblock %}
{% block extra_scripts %}
  <script>
    // Optional: Add any JavaScript you need for the password reset form
  </script>
{% endblock %}
