{% extends "base_generic.html" %}

{% block content %}
<h2>Crează un cont nou</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Înregistrează-te</button>
</form>
<p>Ai deja cont? <a href="{% url 'login' %}">Login</a></p>

{% if messages %}
    <ul>
    {% for message in messages %}
        <li>{{ message }}</li>
    {% endfor %}
    </ul>
{% endif %}
{% endblock %}
